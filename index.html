<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Machawina Menu</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Baloo+Bhaijaan+2:wght@600;700;800&family=Bungee&family=Poppins:wght@500;600;700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>

<body>
    <img src="Tomato.png" class="corner-graphic img-tomato" alt="">
    <img src="BBQ.png" class="corner-graphic img-bbq" alt="">
    <img src="Cup.png" class="corner-graphic img-cup" alt="">
    <img src="Garlic.png" class="corner-graphic img-garlic" alt="">

    <button id="lang-toggle" class="lang-btn">عربي</button>

    <div class="menu-page">
        <div class="menu-layout">

            <div class="column left-column">
                <img src="Logo.png" alt="Machawina" class="main-logo">
                <div id="left-container"></div>
            </div>

            <div class="column right-column">
                <div id="right-container"></div>
            </div>

        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
