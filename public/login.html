<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Machawina Admin - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #FF8C00;
            --secondary: #0A1128;
            --bg: #f4f7f6;
            --white: #ffffff;
            --text: #333;
            --error: #dc3545;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background: linear-gradient(135deg, var(--secondary) 0%, #1a2a4a 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text);
        }

        .login-card {
            background: var(--white);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 400px;
            text-align: center;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo {
            width: 120px;
            margin-bottom: 20px;
        }

        h1 {
            color: var(--secondary);
            font-size: 1.8rem;
            margin-bottom: 30px;
            font-weight: 600;
        }

        .input-group {
            text-align: left;
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.9rem;
            color: #666;
            font-weight: 400;
        }

        input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #eee;
            border-radius: 10px;
            font-size: 1rem;
            transition: border-color 0.3s, box-shadow 0.3s;
            outline: none;
        }

        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(255, 140, 0, 0.1);
        }

        .btn-login {
            background: var(--primary);
            color: white;
            border: none;
            padding: 14px;
            width: 100%;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s, transform 0.2s;
            margin-top: 10px;
        }

        .btn-login:hover {
            background: #e07b00;
            transform: translateY(-2px);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        #error-msg {
            color: var(--error);
            font-size: 0.9rem;
            margin-top: 15px;
            display: none;
            background: #ffe6e6;
            padding: 10px;
            border-radius: 8px;
        }

        .footer {
            margin-top: 30px;
            font-size: 0.8rem;
            color: #999;
        }
    </style>
</head>
<body>

<div class="login-card">
    <img src="img/Logo.png" alt="Machawina Logo" class="logo">
    <h1>Admin Login</h1>
    
    <div class="input-group">
        <label for="username">Username</label>
        <input type="text" id="username" placeholder="Enter username">
    </div>

    <div class="input-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter password">
    </div>

    <button class="btn-login" onclick="login()">Sign In</button>

    <div id="error-msg">Invalid username or password.</div>

    <div class="footer">
        &copy; 2024 Machawina Restaurant
    </div>
</div>

<script>
    async function login() {
        const user = document.getElementById('username').value;
        const pass = document.getElementById('password').value;
        const errorMsg = document.getElementById('error-msg');

        errorMsg.style.display = 'none';

        try {
            const response = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: user, password: pass })
            });

            const result = await response.json();

            if (result.success) {
                window.location.href = '/admin.html';
            } else {
                errorMsg.style.display = 'block';
            }
        } catch (err) {
            console.error('Login error:', err);
            errorMsg.innerText = 'Server error. Please try again later.';
            errorMsg.style.display = 'block';
        }
    }

    // Allow Enter key to submit
    document.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') login();
    });
</script>

</body>
</html>
